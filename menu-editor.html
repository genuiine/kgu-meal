<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메뉴 편집기 - 경기대 밥먹자</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#1D9E75;--danger:#EF4444;--warn:#F59E0B;
      --surface:#fff;--bg:#F3F4F6;--text1:#111827;--text2:#6B7280;
      --border:#E5E7EB;--r:10px;--t:.15s;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;font-size:14px;background:var(--bg);color:var(--text1);min-height:100vh;}
    button,input,select{font-family:inherit;}

    /* HEADER */
    .hd{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .hd-left{display:flex;align-items:center;gap:12px;}
    .hd-title{font-size:16px;font-weight:700;}
    .hd-sub{font-size:12px;color:var(--text2);}
    .hd-right{display:flex;gap:8px;}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--t);}
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:hover{background:#0F6E56;}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text1);}
    .btn-outline:hover{border-color:var(--primary);color:var(--primary);}
    .btn-danger{background:var(--danger);color:#fff;}
    .btn-danger:hover{background:#dc2626;}
    .btn-sm{padding:5px 12px;font-size:12px;}
    .btn-icon{padding:6px;width:30px;height:30px;border-radius:6px;}

    /* LAYOUT */
    .wrap{max-width:1100px;margin:0 auto;padding:20px;}

    /* ALERT */
    .alert{display:none;padding:12px 16px;border-radius:var(--r);font-size:13px;margin-bottom:16px;font-weight:500;}
    .alert.show{display:flex;align-items:center;gap:8px;}
    .alert-success{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}
    .alert-info{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD;}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
    .t-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all var(--t);white-space:nowrap;}
    .t-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
    .t-btn:hover:not(.active){border-color:var(--primary);color:var(--primary);}

    /* PANEL */
    .panel{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
    .panel-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .panel-title{font-size:15px;font-weight:700;}
    .panel-count{font-size:12px;color:var(--text2);background:var(--bg);padding:3px 10px;border-radius:20px;}
    .panel-actions{display:flex;gap:6px;align-items:center;}

    /* SUB TABS (경슐랭용) */
    .sub-tabs{display:flex;gap:4px;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;}
    .sub-tabs::-webkit-scrollbar{display:none;}
    .s-btn{padding:5px 14px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all var(--t);}
    .s-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
    .s-btn:hover:not(.active){border-color:var(--primary);color:var(--primary);}

    /* TABLE */
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead tr{background:var(--bg);}
    th{padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
    td{padding:8px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(29,158,117,.03);}
    .td-num{color:var(--text2);font-size:12px;width:36px;text-align:center;}

    /* EDITABLE CELL */
    .editable{cursor:pointer;border-radius:6px;padding:4px 6px;transition:background var(--t);}
    .editable:hover{background:var(--bg);}
    .editable.editing{background:transparent;padding:0;}
    input.cell-input{width:100%;padding:5px 8px;border:1.5px solid var(--primary);border-radius:6px;font-size:14px;font-weight:500;outline:none;background:var(--surface);}
    input.price-input{width:90px;}

    /* SELECT in table */
    select.cat-select{padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--surface);cursor:pointer;outline:none;color:var(--text1);transition:border-color var(--t);}
    select.cat-select:focus{border-color:var(--primary);}

    /* CAT BADGE */
    .cat-badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;}

    /* ADD ROW */
    .add-row td{background:rgba(29,158,117,.04);}
    .add-row input{background:var(--surface);}

    /* FOOTER */
    .tbl-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;display:none;}
    .overlay.open{display:flex;}
    .modal{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:6px;}
    .modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
    .form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color var(--t);}
    .form-input:focus{border-color:var(--primary);}
    .modal-actions{display:flex;gap:8px;margin-top:20px;}
    .modal-actions .btn{flex:1;justify-content:center;}

    /* IMPORT/EXPORT */
    .json-area{width:100%;height:140px;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-family:monospace;font-size:12px;resize:vertical;outline:none;}
    .json-area:focus{border-color:var(--primary);}

    /* STATUS BAR */
    .status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2);z-index:49;}
    .status-dot{width:8px;height:8px;border-radius:50%;background:#10B981;display:inline-block;margin-right:6px;}

    @media(max-width:600px){
      .hd{padding:0 14px;}.wrap{padding:14px;}
      .panel-head{flex-direction:column;align-items:flex-start;}
    }
  </style>
</head>
<body>

<header class="hd">
  <div class="hd-left">
    <div class="hd-title">🍽️ 메뉴 편집기</div>
    <div class="hd-sub">경기대 밥먹자 - 데이터 관리</div>
  </div>
  <div class="hd-right">
    <button class="btn btn-outline" onclick="openImport()">가져오기</button>
    <button class="btn btn-outline" onclick="exportJSON()">내보내기</button>
    <button class="btn btn-primary" onclick="saveAll()">💾 저장 &amp; 반영</button>
  </div>
</header>

<div class="wrap">
  <div class="alert alert-success" id="alertSave">✅ 저장되었습니다! index.html을 새로고침하면 반영됩니다.</div>
  <div class="alert alert-info" id="alertInfo"></div>

  <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    <div class="tabs" id="mainTabs" style="margin-bottom:0;flex:1;"></div>
    <button class="btn btn-primary btn-sm" onclick="openAddCafe()" style="flex-shrink:0;">+ 식당 추가</button>
  </div>
  <div id="panelArea"></div>
</div>

<div style="height:60px"></div>

<div class="status-bar">
  <div><span class="status-dot"></span>localStorage 자동 동기화 · <span id="totalCount">-</span>개 메뉴</div>
  <div><a href="index.html" style="color:var(--primary);font-weight:600;text-decoration:none">← 메인으로 돌아가기</a></div>
</div>

<!-- ADD MENU MODAL -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">메뉴 추가</div>
    <div class="modal-sub" id="addModalSub">메뉴 정보를 입력해주세요</div>
    <div class="form-group">
      <label class="form-label">메뉴명</label>
      <input class="form-input" id="addName" placeholder="예: 돼지불백덮밥">
    </div>
    <div class="form-group">
      <label class="form-label">가격 (원)</label>
      <input class="form-input" id="addPrice" type="number" placeholder="예: 6500" min="0" step="100">
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select class="form-input" id="addCat">
        <option value="rice">덮밥·밥류</option>
        <option value="noodle">면류</option>
        <option value="cutlet">돈까스류</option>
        <option value="soup">탕·찌개</option>
        <option value="chicken">치킨류</option>
        <option value="burger">버거·타코</option>
        <option value="snack">분식류</option>
        <option value="side">사이드·간식</option>
        <option value="drink">음료·카페</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeAddModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmAdd()">추가</button>
    </div>
  </div>
</div>

<!-- ADD CAFE MODAL -->
<div class="overlay" id="addCafeModal">
  <div class="modal">
    <div class="modal-title" id="addCafeTitle">식당 추가</div>
    <div class="modal-sub">새 식당/카페 정보를 입력하세요</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">식당 이름 *</label>
        <input class="form-input" id="cName" placeholder="예: 경기대 카페">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">위치</label>
        <input class="form-input" id="cLocation" placeholder="예: 학생회관 1층">
      </div>
      <div class="form-group">
        <label class="form-label">운영시간</label>
        <input class="form-input" id="cHours" placeholder="예: 09:00 - 18:00">
      </div>
      <div class="form-group">
        <label class="form-label">주문마감 (선택)</label>
        <input class="form-input" id="cLastOrder" placeholder="예: 주문마감 17:30">
      </div>
      <div class="form-group">
        <label class="form-label">오픈 시각 (숫자, 예: 9.0)</label>
        <input class="form-input" id="cOpenH" type="number" placeholder="9.0" step="0.5" min="0" max="24">
      </div>
      <div class="form-group">
        <label class="form-label">마감 시각 (숫자, 예: 18.0)</label>
        <input class="form-input" id="cCloseH" type="number" placeholder="18.0" step="0.5" min="0" max="24">
      </div>
      <div class="form-group">
        <label class="form-label">대표 색상</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="color" id="cColor" value="#1D9E75" style="width:42px;height:36px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;padding:2px;">
          <div style="display:flex;gap:6px;flex-wrap:wrap" id="colorPresets">
            <span onclick="document.getElementById('cColor').value='#F97316'" style="width:22px;height:22px;border-radius:50%;background:#F97316;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span>
            <span onclick="document.getElementById('cColor').value='#3B82F6'" style="width:22px;height:22px;border-radius:50%;background:#3B82F6;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span>
            <span onclick="document.getElementById('cColor').value='#EC4899'" style="width:22px;height:22px;border-radius:50%;background:#EC4899;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span>
            <span onclick="document.getElementById('cColor').value='#8B5CF6'" style="width:22px;height:22px;border-radius:50%;background:#8B5CF6;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span>
            <span onclick="document.getElementById('cColor').value='#06B6D4'" style="width:22px;height:22px;border-radius:50%;background:#06B6D4;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span>
            <span onclick="document.getElementById('cColor').value='#10B981'" style="width:22px;height:22px;border-radius:50%;background:#10B981;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">주말 휴무 여부</label>
        <select class="form-input" id="cWeekend">
          <option value="true">주말 휴무</option>
          <option value="false">주말 운영</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="document.getElementById('addCafeModal').classList.remove('open')">취소</button>
      <button class="btn btn-primary" id="confirmAddCafeBtn" onclick="confirmAddCafe()">추가</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">JSON 가져오기</div>
    <div class="modal-sub">메뉴 편집기에서 내보낸 JSON을 붙여넣으세요</div>
    <textarea class="json-area" id="importArea" placeholder='[{"name":"경슐랭","type":"foodcourt",...}]'></textarea>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="document.getElementById('importModal').classList.remove('open')">취소</button>
      <button class="btn btn-primary" onclick="confirmImport()">가져오기</button>
    </div>
  </div>
</div>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){return Number(n).toLocaleString('ko-KR')+'원';}
function updateTotal(){
  let t=0;
  cafes.forEach(c=>{
    if(c.type==='foodcourt')c.subs.forEach(s=>t+=s.menus.length);
    else t+=(c.menus||[]).length;
  });
  document.getElementById('totalCount').textContent=t;
}

function showAlert(id,ms=2500){
  const el=document.getElementById(id);
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

function renderTable(menus, ci, si){
  if(!menus.length) return `<div style="padding:40px;text-align:center;color:var(--text2)">메뉴가 없습니다. 위 버튼으로 추가하세요.</div>`;
  const rows=menus.map((m,i)=>{
    const cat=CAT_MAP[m.cat]||{label:m.cat,color:'#9CA3AF',bg:'rgba(156,163,175,.12)'};
    return`<tr>
      <td class="td-num">${i+1}</td>
      <td>
        <div class="editable" onclick="startEdit(this,'name',${ci},${si===null?'null':si},${i})">${esc(m.name)}</div>
      </td>
      <td>
        <select class="cat-select" onchange="updateCat(${ci},${si===null?'null':si},${i},this.value)">
          ${Object.entries(CAT_MAP).map(([k,v])=>`<option value="${k}" ${m.cat===k?'selected':''}>${v.label}</option>`).join('')}
        </select>
      </td>
      <td>
        <div class="editable" onclick="startEdit(this,'price',${ci},${si===null?'null':si},${i})" style="color:${CAFES[ci]?.colorHex||'var(--primary)'}">
          ${fmt(m.price)}
        </div>
      </td>
      <td>
        <button class="btn btn-outline btn-sm btn-icon" onclick="deleteMenu(${ci},${si===null?'null':si},${i})" title="삭제" style="color:var(--danger);border-color:var(--danger);">✕</button>
      </td>
    </tr>`;
  }).join('');
  return`<table>
    <thead><tr><th>#</th><th>메뉴명</th><th>카테고리</th><th>가격</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// keep reference for edit
let CAFES = cafes; // alias

/* ============================================================
   INLINE EDIT
============================================================ */
function startEdit(el, field, ci, si, mi){
  if(el.classList.contains('editing'))return;
  const c=cafes[ci];
  const menus=si===null?(c.menus||[]):c.subs[si].menus;
  const m=menus[mi];
  const cur=field==='price'?m.price:m.name;
  el.classList.add('editing');
  const inp=document.createElement('input');
  inp.className='cell-input'+(field==='price'?' price-input':'');
  inp.type=field==='price'?'number':'text';
  inp.value=cur;
  if(field==='price')inp.min=0,inp.step=100;
  el.innerHTML='';
  el.appendChild(inp);
  inp.focus();inp.select();

  const commit=()=>{
    let val=inp.value.trim();
    if(field==='price'){val=parseInt(val)||0;}
    if(val!==cur||field==='price'){
      menus[mi][field]=val;
      saveData();
    }
    el.classList.remove('editing');
    el.innerHTML=field==='price'
      ?`<span style="color:${c.colorHex}">${fmt(menus[mi].price)}</span>`
      :esc(menus[mi].name);
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){el.classList.remove('editing');el.innerHTML=field==='price'?fmt(cur):esc(cur);}});
}

function updateCat(ci,si,mi,val){
  const c=cafes[ci];
  const menus=si===null?(c.menus||[]):c.subs[si].menus;
  menus[mi].cat=val;
  saveData();
}

function deleteMenu(ci,si,mi){
  const c=cafes[ci];
  const menus=si===null?(c.menus||[]):c.subs[si].menus;
  const name=menus[mi].name;
  if(!confirm(`"${name}" 메뉴를 삭제하시겠습니까?`))return;
  menus.splice(mi,1);
  saveData();
  renderPanel();
}

============================================================ */
function openAdd(ci,si){
  addTarget={ci,si};
  const c=cafes[ci];
  const target=si!==null?c.subs[si].name:c.name;
  document.getElementById('addModalSub').textContent=`${target}에 새 메뉴를 추가합니다`;
  document.getElementById('addName').value='';
  document.getElementById('addPrice').value='';
  document.getElementById('addCat').value='rice';
  document.getElementById('addModal').classList.add('open');
  document.getElementById('addName').focus();
}

function closeAddModal(){document.getElementById('addModal').classList.remove('open');}

function confirmAdd(){
  const name=document.getElementById('addName').value.trim();
  const price=parseInt(document.getElementById('addPrice').value)||0;
  const cat=document.getElementById('addCat').value;
  if(!name){alert('메뉴명을 입력해주세요.');return;}
  const {ci,si}=addTarget;
  const c=cafes[ci];
  const menus=si!==null?c.subs[si].menus:(c.menus||(c.menus=[]));
  menus.push({name,cat,price});
  saveData();
  closeAddModal();
  renderPanel();
  showAlert('alertSave');
}

/* ============================================================
   SAVE ALL (explicit)
============================================================ */
function saveAll(){
  saveData();
  showAlert('alertSave');
}

/* ============================================================
   EXPORT / IMPORT
============================================================ */
function exportJSON(){
  const json=JSON.stringify(cafes,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kgu-meal-menus.json';
  a.click();
  const el=document.getElementById('alertInfo');
  el.textContent='✅ kgu-meal-menus.json 다운로드 완료! 백업용으로 보관하세요.';
  showAlert('alertInfo',3000);
}

function openImport(){document.getElementById('importArea').value='';document.getElementById('importModal').classList.add('open');}

function confirmImport(){
  try{
    const data=JSON.parse(document.getElementById('importArea').value);
    if(!Array.isArray(data))throw new Error('배열 형식이어야 합니다');
    cafes=data;
    CAFES=cafes;
    saveData();
    document.getElementById('importModal').classList.remove('open');
    renderTabs();renderPanel();
    showAlert('alertSave');
  }catch(e){alert('JSON 형식이 잘못되었습니다: '+e.message);}
}

/* ============================================================
   ADD / EDIT / DELETE CAFETERIA
============================================================ */
let editCafeIdx = null;

function openAddCafe(){
  editCafeIdx = null;
  document.getElementById('addCafeTitle').textContent = '식당 추가';
  document.getElementById('confirmAddCafeBtn').textContent = '추가';
  document.getElementById('cName').value = '';
  document.getElementById('cLocation').value = '';
  document.getElementById('cHours').value = '';
  document.getElementById('cLastOrder').value = '';
  document.getElementById('cOpenH').value = '9';
  document.getElementById('cCloseH').value = '18';
  document.getElementById('cColor').value = '#1D9E75';
  document.getElementById('cWeekend').value = 'true';
  document.getElementById('addCafeModal').classList.add('open');
  document.getElementById('cName').focus();
}

function openEditCafe(ci){
  editCafeIdx = ci;
  const c = cafes[ci];
  document.getElementById('addCafeTitle').textContent = '식당 정보 수정';
  document.getElementById('confirmAddCafeBtn').textContent = '저장';
  document.getElementById('cName').value = c.name;
  document.getElementById('cLocation').value = c.location||'';
  document.getElementById('cHours').value = c.hours||'';
  document.getElementById('cLastOrder').value = c.lastOrder||'';
  document.getElementById('cOpenH').value = c.openH||9;
  document.getElementById('cCloseH').value = c.closeH||18;
  document.getElementById('cColor').value = c.colorHex||'#1D9E75';
  document.getElementById('cWeekend').value = c.closedWeekend ? 'true' : 'false';
  document.getElementById('addCafeModal').classList.add('open');
}

function confirmAddCafe(){
  const name = document.getElementById('cName').value.trim();
  if(!name){ alert('식당 이름을 입력해주세요.'); return; }
  const cafe = {
    name,
    type: 'normal',
    location: document.getElementById('cLocation').value.trim(),
    hours: document.getElementById('cHours').value.trim(),
    lastOrder: document.getElementById('cLastOrder').value.trim(),
    openH: parseFloat(document.getElementById('cOpenH').value)||9,
    closeH: parseFloat(document.getElementById('cCloseH').value)||18,
    closedWeekend: document.getElementById('cWeekend').value === 'true',
    colorHex: document.getElementById('cColor').value,
    menus: [],
  };
  if(editCafeIdx !== null){
    cafe.menus = cafes[editCafeIdx].menus || [];
    cafe.subs  = cafes[editCafeIdx].subs;
    cafe.type  = cafes[editCafeIdx].type;
    cafes[editCafeIdx] = cafe;
  } else {
    cafes.push(cafe);
    curTab = cafes.length - 1;
  }
  CAFES = cafes;
  saveData();
  document.getElementById('addCafeModal').classList.remove('open');
  renderTabs(); renderPanel();
  showAlert('alertSave');
}

function deleteCafe(ci){
  const name = cafes[ci].name;
  if(!confirm(`"${name}"을(를) 삭제하시겠습니까?\n\n이 식당의 모든 메뉴 데이터도 함께 삭제됩니다.`)) return;
  cafes.splice(ci, 1);
  CAFES = cafes;
  curTab = Math.max(0, Math.min(curTab, cafes.length - 1));
  saveData();
  renderTabs(); renderPanel();
  const el = document.getElementById('alertInfo');
  el.textContent = `🗑 "${name}" 식당이 삭제되었습니다.`;
  showAlert('alertInfo', 3000);
}

/* ============================================================
   RESET
============================================================ */
function resetToDefault(){
  if(!confirm('모든 편집 내용을 초기화하고 기본 데이터로 되돌리겠습니까?'))return;
  localStorage.removeItem('kgu-meal-cafes');
  cafes=JSON.parse(JSON.stringify(DEFAULT_CAFES));
  CAFES=cafes;
  saveData();
  renderTabs();renderPanel();
  const el=document.getElementById('alertInfo');
  el.textContent='♻️ 기본 데이터로 초기화되었습니다.';
  showAlert('alertInfo',3000);
}

/* ============================================================
   INIT
============================================================ */
updateTotal();
renderTabs();
renderPanel();

// ESC to close modals
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
  }
});
document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');});
});
</script>
