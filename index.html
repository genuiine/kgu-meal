<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>경기대 밥먹자 - 수원캠퍼스 학식</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary:#1D9E75; --primary-dark:#0F6E56; --primary-light:rgba(29,158,117,.10);
      --c1:#F97316; --c1-light:rgba(249,115,22,.10);
      --c2:#3B82F6; --c2-light:rgba(59,130,246,.10);
      --c3:#EC4899; --c3-light:rgba(236,72,153,.10);
      --surface:#FFFFFF; --bg:#F3F4F6;
      --text1:#111827; --text2:#6B7280;
      --border:rgba(0,0,0,.07);
      --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --shadow-md:0 4px 14px rgba(0,0,0,.08);
      --shadow-fab:0 4px 20px rgba(29,158,117,.45);
      --r:16px; --r-sm:10px; --ease:cubic-bezier(.4,0,.2,1); --t:.18s;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --surface:#1C1F26; --bg:#111318; --text1:#F0F2F5; --text2:#9CA3AF;
        --border:rgba(255,255,255,.07);
        --shadow-sm:0 1px 3px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.25);
        --shadow-md:0 4px 14px rgba(0,0,0,.4);
        --primary-light:rgba(29,158,117,.14);
        --c1-light:rgba(249,115,22,.14); --c2-light:rgba(59,130,246,.14); --c3-light:rgba(236,72,153,.14);
      }
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:400;line-height:1.6;background:var(--bg);color:var(--text1);min-height:100vh;-webkit-font-smoothing:antialiased;}
    button{font-family:inherit;cursor:pointer;}

    /* HEADER */
    .app-header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);}
    .header-inner{max-width:760px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .logo-icon{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;box-shadow:0 2px 8px rgba(29,158,117,.3);}
    .logo-name{font-size:16px;font-weight:700;line-height:1.2;letter-spacing:-.3px;}
    .logo-sub{font-size:11px;color:var(--text2);}
    .date-badge{font-size:12px;font-weight:500;color:var(--text2);padding:5px 12px;border-radius:20px;background:var(--bg);border:1px solid var(--border);white-space:nowrap;}

    /* STATUS STRIP */
    .status-strip{max-width:760px;margin:0 auto;padding:10px 20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
    .status-strip::-webkit-scrollbar{display:none;}
    .status-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm);}
    .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .sdot.open{background:#10B981;box-shadow:0 0 0 2px rgba(16,185,129,.25);}
    .sdot.closed{background:#9CA3AF;}
    .sdot.vac{background:#F59E0B;box-shadow:0 0 0 2px rgba(245,158,11,.25);}

    /* TAB NAV */
    .tab-nav{position:sticky;top:60px;z-index:99;background:var(--surface);border-bottom:1px solid var(--border);}
    .tab-scroll{max-width:760px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none;}
    .tab-scroll::-webkit-scrollbar{display:none;}
    .tab-btn{position:relative;padding:14px 16px;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--text2);white-space:nowrap;flex-shrink:0;transition:color var(--t) var(--ease);}
    .tab-btn::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:2.5px;border-radius:2px 2px 0 0;transform:scaleX(0);transform-origin:center;transition:transform var(--t) var(--ease);}
    .tab-btn.active{font-weight:700;}
    .tab-btn.active::after{transform:scaleX(1);}
    .tab-btn.active{color:var(--tab-clr,var(--primary));}
    .tab-btn.active::after{background:var(--tab-clr,var(--primary));}
    .tab-btn:hover:not(.active){color:var(--text1);}

    /* SUB FILTER */
    .sub-filter{max-width:760px;margin:0 auto;padding:12px 20px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;background:var(--bg);}
    .sub-filter::-webkit-scrollbar{display:none;}
    .sub-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap;flex-shrink:0;transition:all var(--t) var(--ease);}
    .sub-chip.active{color:#fff;border-color:transparent;}
    .sub-chip:hover:not(.active){border-color:var(--c1);color:var(--c1);}

    /* MAIN */
    .main{max-width:760px;margin:0 auto;padding:20px 20px 100px;}

    /* CAFE SECTION */
    .cafe-section{margin-bottom:36px;}
    .cafe-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
    .cafe-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .cafe-name{font-size:18px;font-weight:700;}
    .open-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px;white-space:nowrap;}

    /* SUB SECTION (경슐랭 입점 식당) */
    .sub-section{margin-bottom:28px;}
    .sub-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-left:4px;flex-wrap:wrap;}
    .sub-name{font-size:15px;font-weight:700;color:var(--text1);}
    .sub-count{font-size:11px;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:6px;font-weight:500;}
    .sub-badge{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;}
    .sub-badge.open{background:rgba(16,185,129,.14);color:#059669;}
    .sub-badge.off{background:rgba(156,163,175,.18);color:var(--text2);}
    .sub-section.closed .menu-grid{opacity:.5;filter:grayscale(.35);transition:opacity var(--t);}
    .sub-section.closed .menu-card:hover{transform:none;box-shadow:var(--shadow-sm);}

    /* VACATION BANNER */
    .vac-banner{max-width:760px;margin:12px auto 0;padding:0 20px;}
    .vac-inner{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:12px;background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(249,115,22,.05));border:1px solid rgba(249,115,22,.28);font-size:12.5px;color:var(--text1);line-height:1.5;}
    .vac-inner b{color:#EA580C;font-weight:700;}
    .vac-ico{font-size:17px;flex-shrink:0;line-height:1.3;}
    .vac-today{margin-top:3px;color:var(--text2);}
    .vac-today b{color:var(--text1);}
    @media(max-width:480px){.vac-banner{padding:0 14px;}}

    /* SINGLE VIEW */
    .single-header{display:flex;align-items:flex-end;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
    .single-name{font-size:22px;font-weight:900;letter-spacing:-.5px;}
    .single-meta{font-size:12px;color:var(--text2);padding-bottom:2px;}
    .info-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 16px;border-radius:var(--r-sm);margin-bottom:18px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);}
    .info-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
    .info-sep{width:1px;height:12px;background:var(--border);flex-shrink:0;}

    /* MENU GRID */
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
    @media(max-width:480px){.menu-grid{grid-template-columns:1fr 1fr;gap:9px;}}
    @media(max-width:320px){.menu-grid{grid-template-columns:1fr;}}

    /* MENU CARD */
    .menu-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;opacity:0;transform:translateY(12px);animation:cardIn .28s var(--ease) forwards;transition:transform var(--t) var(--ease),box-shadow var(--t) var(--ease);display:flex;flex-direction:column;}
    .menu-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
    @keyframes cardIn{to{opacity:1;transform:translateY(0);}}
    .card-thumb{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--bg);}
    .card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s var(--ease);}
    .menu-card:hover .card-thumb img{transform:scale(1.06);}
    .card-thumb--ph{display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 38%, var(--phbg), var(--surface) 78%);}
    .ph-emoji{font-size:42px;opacity:.85;}
    .thumb-cat{position:absolute;left:8px;top:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.82)!important;backdrop-filter:blur(6px);box-shadow:0 1px 5px rgba(0,0,0,.14);}
    @media(prefers-color-scheme:dark){.thumb-cat{background:rgba(28,31,38,.8)!important;}}
    .card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:2px;}
    .card-name{font-size:14px;font-weight:700;line-height:1.3;}
    .card-price{font-size:13px;font-weight:700;margin-top:2px;}

    /* FAB */
    .fab{position:fixed;bottom:28px;right:50%;transform:translateX(calc(50% + 360px));width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-fab);z-index:200;transition:all var(--t) var(--ease);}
    .fab:hover{transform:translateX(calc(50% + 360px)) scale(1.1);box-shadow:0 6px 28px rgba(29,158,117,.55);}
    .fab:active{transform:translateX(calc(50% + 360px)) scale(.94);}
    @media(max-width:760px){
      .fab{right:20px;transform:none;}
      .fab:hover{transform:scale(1.1);}
      .fab:active{transform:scale(.94);}
    }

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:opacity var(--t) var(--ease),visibility var(--t) var(--ease);}
    .modal-overlay.open{opacity:1;visibility:visible;}
    .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px 36px;width:100%;max-width:760px;max-height:92dvh;overflow-y:auto;transform:translateY(40px);transition:transform .28s var(--ease);position:relative;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
    .modal-title{font-size:20px;font-weight:700;margin-bottom:18px;}
    .btn-close{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all var(--t) var(--ease);}
    .btn-close:hover{background:var(--surface);color:var(--text1);}

    /* FILTER CHIPS IN MODAL */
    .filter-sec{margin-bottom:14px;}
    .filter-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
    .chip-row{display:flex;flex-wrap:wrap;gap:6px;}
    .chip-row.scroll{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
    .chip-row.scroll::-webkit-scrollbar{display:none;}
    .fchip{padding:7px 14px;min-height:36px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--text2);transition:all var(--t) var(--ease);white-space:nowrap;flex-shrink:0;}
    .fchip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
    .fchip[data-cafe="0"].active{background:var(--c1);border-color:var(--c1);}
    .fchip[data-cafe="1"].active{background:var(--c2);border-color:var(--c2);}
    .fchip[data-cafe="2"].active{background:var(--c3);border-color:var(--c3);}
    .fchip:hover:not(.active){border-color:var(--primary);color:var(--primary);}

    .pool-count{font-size:12px;color:var(--text2);text-align:center;margin:10px 0;padding:8px;background:var(--bg);border-radius:8px;}
    .pool-count strong{color:var(--primary);font-weight:700;}

    /* RESULT */
    .result-area{min-height:170px;margin:14px 0;}
    .result-placeholder{height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--bg);border-radius:var(--r);color:var(--text2);font-size:14px;}
    .rp-icon{font-size:42px;}
    .result-spinning{background:var(--bg);border-radius:var(--r);padding:24px;text-align:center;animation:rpulse .35s ease infinite alternate;}
    @keyframes rpulse{from{opacity:.6}to{opacity:1}}
    .result-final{background:var(--bg);border-radius:var(--r);padding:24px;text-align:center;animation:resultPop .3s var(--ease);}
    @keyframes resultPop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
    .rf-emoji{font-size:48px;display:block;margin-bottom:10px;}
    .rf-cafe{font-size:11px;font-weight:600;margin-bottom:4px;}
    .rf-sub{font-size:11px;color:var(--text2);margin-bottom:4px;}
    .rf-name{font-size:22px;font-weight:900;margin-bottom:10px;letter-spacing:-.5px;}
    .rf-price{display:inline-block;padding:6px 20px;border-radius:20px;font-size:14px;font-weight:700;color:#fff;margin-bottom:12px;}
    .rf-location{font-size:12px;color:var(--text2);padding:10px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;text-align:left;display:flex;flex-direction:column;gap:4px;}
    .rf-loc-row{display:flex;align-items:center;gap:6px;}
    .rf-comment{font-size:12px;color:var(--text2);font-style:italic;padding-top:12px;border-top:1px solid var(--border);line-height:1.6;}
    .rf-again{font-size:13px;font-weight:600;padding:10px 20px;border-radius:var(--r-sm);border:1.5px solid var(--primary);background:transparent;color:var(--primary);transition:all var(--t) var(--ease);}
    .rf-again:hover{background:var(--primary);color:#fff;}

    .btn-spin{width:100%;padding:14px;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:var(--r-sm);font-size:15px;font-weight:700;box-shadow:0 3px 12px rgba(29,158,117,.35);transition:all var(--t) var(--ease);}
    .btn-spin:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,158,117,.45);}
    .btn-spin:disabled{opacity:.5;transform:none;cursor:not-allowed;}

    /* HISTORY */
    .history-sec{margin-top:14px;}
    .history-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
    .history-item{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--bg);border-radius:10px;font-size:13px;margin-bottom:5px;}
    .h-num{font-size:11px;color:var(--text2);font-weight:600;width:16px;text-align:center;flex-shrink:0;}
    .h-name{font-weight:600;flex:1;}
    .h-cafe{font-size:11px;color:var(--text2);}

    /* FOOTER */
    footer{max-width:760px;margin:0 auto;border-top:1px solid var(--border);padding:20px;text-align:center;}
    footer p{font-size:11px;color:var(--text2);line-height:1.9;}
    .foot-link{color:var(--primary);font-weight:600;text-decoration:none;}

    /* EMPTY */
    .empty{padding:48px 20px;text-align:center;color:var(--text2);font-size:14px;line-height:1.8;}

    /* MOBILE SPECIFIC */
    @media(max-width:480px){
      .header-inner{padding:0 14px;height:54px;}
      .tab-nav{top:54px;}
      .tab-btn{padding:13px 13px;font-size:13px;}
      .main{padding:16px 14px 90px;}
      .sub-filter{padding:10px 14px;}
      .status-strip{padding:8px 14px;}
      .date-badge{display:none;}
      .info-sep{display:none;}
      .info-item{font-size:11px;}
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🍽️</div>
      <div>
        <div class="logo-name">경기대 밥먹자</div>
        <div class="logo-sub">수원캠퍼스 학식</div>
      </div>
    </div>
    <div class="date-badge" id="dateBadge"></div>
  </div>
</header>

<div class="vac-banner" id="vacBanner" style="display:none"></div>

<div class="status-strip" id="statusStrip"></div>

<nav class="tab-nav">
  <div class="tab-scroll" id="tabNav"></div>
</nav>

<div class="sub-filter" id="subFilter" style="display:none"></div>

<main class="main" id="mainContent"></main>

<footer>
  <p>메뉴 정보는 실제와 다를 수 있습니다. 잘못된 정보는 <a class="foot-link" href="menu-editor.html">편집기</a>에서 수정해주세요.</p>
  <p>경슐랭 (만권화밥·숑숑돈까스·버거&amp;타코·위델가·신머이쌀국수) · 이스퀘어 · 샐리박스</p>
</footer>

<button class="fab" id="fabBtn" aria-label="랜덤 메뉴 추천">🎲</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <button class="btn-close" id="btnClose" aria-label="닫기">
      <i data-lucide="x" width="15" height="15"></i>
    </button>
    <div class="modal-handle"></div>
    <div class="modal-title">오늘 뭐 먹지? 🎲</div>

    <div class="filter-sec">
      <div class="filter-label">식당</div>
      <div class="chip-row scroll" id="cafeFilter"></div>
    </div>
    <div class="filter-sec">
      <div class="filter-label">카테고리</div>
      <div class="chip-row scroll" id="catFilter2">
        <button class="fchip active" data-cat="all">전체</button>
        <button class="fchip" data-cat="rice">덮밥·밥류</button>
        <button class="fchip" data-cat="noodle">면류</button>
        <button class="fchip" data-cat="cutlet">돈까스</button>
        <button class="fchip" data-cat="soup">탕·찌개</button>
        <button class="fchip" data-cat="chicken">치킨류</button>
        <button class="fchip" data-cat="burger">버거·타코</button>
        <button class="fchip" data-cat="snack">분식류</button>
        <button class="fchip" data-cat="western">샌드위치</button>
        <button class="fchip" data-cat="drink">음료</button>
        <button class="fchip" data-cat="side">사이드</button>
      </div>
    </div>
    <div class="filter-sec">
      <div class="filter-label">가격대</div>
      <div class="chip-row scroll" id="priceFilter">
        <button class="fchip active" data-price="all">전체</button>
        <button class="fchip" data-price="low">5천원 이하</button>
        <button class="fchip" data-price="mid">5-9천원</button>
        <button class="fchip" data-price="high">9천원 이상</button>
      </div>
    </div>

    <div class="pool-count"><strong id="poolNum">-</strong>개 메뉴 중 추천 <span style="display:block;font-size:11px;margin-top:2px">오늘 운영 중인 식당·매장 메뉴만 대상입니다</span></div>

    <div class="result-area" id="resultArea">
      <div class="result-placeholder">
        <span class="rp-icon">🎲</span>
        <span>버튼을 눌러 오늘의 메뉴를 뽑아보세요!</span>
      </div>
    </div>

    <div id="historySec" style="display:none" class="history-sec">
      <div class="history-label">최근 추천</div>
      <div id="historyList"></div>
    </div>

    <button class="btn-spin" id="btnSpin">추천!</button>
  </div>
</div>

<script src="data.js"></script>
<script>
/* 메뉴명 → 이모지 매칭 규칙 (위에서부터 먼저 맞는 것 적용, 없으면 CAT_MAP 이모지) */
const NAME_EMOJI = [

/* ============================================================
   DATA LOAD (localStorage 우선)
============================================================ */
function loadCafes() {
  try {
    const v = localStorage.getItem('kgu-meal-ver');
    const saved = localStorage.getItem('kgu-meal-cafes');
    if (saved && v === String(DATA_VERSION)) return JSON.parse(saved);
  } catch(e) {}
  return DEFAULT_CAFES;
}
let CAFES = loadCafes();

/* ============================================================
   UTILS
============================================================ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){return n.toLocaleString('ko-KR')+'원';}
function nowH(){const n=new Date();return n.getHours()+n.getMinutes()/60;}
// true=영업 중, false=영업 종료, null=방학 단축운영(시간 미확인)
function isOpen(c){
  if(c.vacUnknown)return null;
  const d=new Date().getDay();
  if(c.closedWeekend&&(d===0||d===6))return false;
  const h=nowH();return h>=c.openH&&h<c.closeH;
}
// 오늘 실제로 문 여는 날인지 (주말 휴무 반영, 시간과 무관) - 랜덤추천 풀 필터용
function cafeOpenTodayDate(c){
  const d=new Date().getDay();
  if(c.closedWeekend&&(d===0||d===6))return false;
  return true;
}
function priceLabel(m){return m.tbd?'가격 확인 중':fmt(m.price);}
function formatDate(){
  const D=['일','월','화','수','목','금','토'],n=new Date();
  return `${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} (${D[n.getDay()]})`;
}
function todayStr(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
// 방학 로테이션: sub.days 스케줄에 오늘이 포함되면 운영. days 없으면 상시 운영으로 간주
function subOpenToday(sub){
  if(!sub.days||!sub.days.length)return true;
  const t=todayStr();
  return sub.days.some(([f,to])=>t>=f&&t<=to);
}
// 다음 운영 시작일 (오늘 휴무인 경우) - 'M/D' 문자열 또는 null
function subNextOpen(sub){
  if(!sub.days||!sub.days.length)return null;
  const t=todayStr();
  const upcoming=sub.days.map(([f])=>f).filter(f=>f>t).sort();
  if(!upcoming.length)return null;
  const [,m,d]=upcoming[0].split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}
function allMenus(cafe){
  if(cafe.type==='foodcourt')return cafe.subs.flatMap(s=>s.menus.map(m=>({...m,subName:s.name,cafeName:cafe.name,cafeColorHex:cafe.colorHex})));
  return (cafe.menus||[]).map(m=>({...m,subName:'',cafeName:cafe.name,cafeColorHex:cafe.colorHex}));
}

    return`<div class="status-chip"><span class="sdot ${cls}"></span><span>${esc(c.name)}</span><span style="color:var(--text2);font-size:11px">${label}</span></div>`;

/* ============================================================
   VACATION BANNER (방학 단축운영 + 오늘 운영 매장)
============================================================ */
function todayShort(){const n=new Date();return`${n.getMonth()+1}/${n.getDate()}`;}
function renderVacBanner(){
  const el=document.getElementById('vacBanner');
  const c=CAFES.find(x=>x.vacation);
  if(!c){el.style.display='none';return;}
  const openSubs=(c.subs||[]).filter(subOpenToday).map(s=>s.name);
  const others=CAFES.filter(x=>x.vacUnknown).map(x=>x.name);
  el.style.display='block';
  el.innerHTML=`<div class="vac-inner">
    <span class="vac-ico">🌴</span>
    <div>
      <b>${esc(c.name)} 여름방학 단축운영</b> · 월~금 ${esc(c.hours)} <span style="color:var(--text2)">(${esc(c.lastOrder)})</span>
      <div class="vac-today">오늘 <b>${todayShort()}</b> 운영 매장 · ${openSubs.length?`<b>${openSubs.map(esc).join(' · ')}</b>`:'<b>휴무</b>'}</div>
      ${others.length?`<div class="vac-today">${others.map(esc).join(' · ')}도 방학 단축운영 중 <span style="opacity:.75">(운영시간 확인 중)</span></div>`:''}
    </div>
  </div>`;
}

/* ============================================================
   CARD
============================================================ */
function menuCard(m,hex,delay){
  const cat=CAT_MAP[m.cat]||{label:m.cat||'',color:'#9CA3AF',bg:'rgba(156,163,175,.12)',emoji:'🍽️'};
  const thumb=m.img
    ?`<div class="card-thumb"><img src="${esc(m.img)}" alt="${esc(m.name)}" loading="lazy" decoding="async">
        <span class="thumb-cat" style="background:${cat.bg};color:${cat.color}">${cat.label}</span></div>`
    :`<div class="card-thumb card-thumb--ph" style="--ph:${cat.color};--phbg:${cat.bg}">
        <span class="ph-emoji">${cat.emoji||'🍽️'}</span>
        <span class="thumb-cat" style="background:${cat.bg};color:${cat.color}">${cat.label}</span></div>`;
  return`<div class="menu-card${m.img?' has-img':''}" style="animation-delay:${delay}s">
    ${thumb}
    <div class="card-body">
      <div class="card-name">${esc(m.name)}</div>
      <div class="card-price" style="color:${m.tbd?'var(--text2)':hex};${m.tbd?'font-weight:500;font-size:12px':''}">${priceLabel(m)}</div>
    </div>
  </div>`;
}

   POOL / RANDOM
============================================================ */
// 랜덤추천 대상: 오늘 실제 운영 중인 식당/매장의 메뉴만
function poolMenus(cafe){
  if(!cafeOpenTodayDate(cafe))return[]; // 주말 휴무 등 오늘 문 닫는 식당 제외
  if(cafe.type==='foodcourt')
    return cafe.subs
      .filter(s=>!cafe.vacation||subOpenToday(s)) // 방학 로테이션: 오늘 운영 매장만
      .flatMap(s=>s.menus.map(m=>({...m,subName:s.name,cafeName:cafe.name,cafeColorHex:cafe.colorHex})));
  return (cafe.menus||[]).map(m=>({...m,subName:'',cafeName:cafe.name,cafeColorHex:cafe.colorHex}));
}
function getPool(){
  const all=[];
  CAFES.forEach((c,ci)=>{
    if(filterCafe!=='all'&&parseInt(filterCafe)!==ci)return;
    const ms=poolMenus(c);
    ms.forEach(m=>{
      if(filterCat!=='all'&&m.cat!==filterCat)return;
      if(filterPrice!=='all'&&m.tbd)return; // 가격 미확인 메뉴는 가격 필터 시 제외
      if(filterPrice==='low'&&m.price>=5000)return;
      if(filterPrice==='mid'&&(m.price<5000||m.price>=9000))return;
      if(filterPrice==='high'&&m.price<9000)return;
      all.push({...m,cafeIdx:ci});
    });
  });
  return all;
}

function updatePoolCount(){
  const n=getPool().length;
  document.getElementById('poolNum').textContent=n;
  const btn=document.getElementById('btnSpin');
  btn.disabled=n===0;
}

function doSpin(){
  if(isSpinning)return;
  const pool=getPool();
  if(!pool.length)return;
  isSpinning=true;
  document.getElementById('btnSpin').textContent='추천 중...';
  let count=0,total=22;
  const ra=document.getElementById('resultArea');
  clearInterval(spinTimer);
  spinTimer=setInterval(()=>{
    const r=pool[Math.floor(Math.random()*pool.length)];
    const e=menuEmoji(r);
    ra.innerHTML=`<div class="result-spinning">
      <span style="font-size:44px;display:block;margin-bottom:8px">${e}</span>
      <div style="font-size:18px;font-weight:700">${esc(r.name)}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">${esc(r.cafeName)}${r.subName?' · '+esc(r.subName):''}</div>
    </div>`;
    count++;
    if(count>=total){
      clearInterval(spinTimer);
      const chosen=pool[Math.floor(Math.random()*pool.length)];
      const cafe=CAFES[chosen.cafeIdx];
      const open=isOpen(cafe);
      const emoji=menuEmoji(chosen);
      const comment=COMMENTS[Math.floor(Math.random()*COMMENTS.length)];
      const cat=CAT_MAP[chosen.cat]||{label:chosen.cat,color:'#9CA3AF',bg:'rgba(156,163,175,.12)'};
      spinHistory.unshift(chosen);
      if(spinHistory.length>3)spinHistory.pop();
      ra.innerHTML=`<div class="result-final">
        <span class="rf-emoji">${emoji}</span>
        <div class="rf-cafe" style="color:${cafe.colorHex}">${esc(cafe.name)}</div>
        ${chosen.subName?`<div class="rf-sub">${esc(chosen.subName)}</div>`:''}
        <div class="rf-name">${esc(chosen.name)}</div>
        <div class="rf-price" style="background:${cafe.colorHex}">${priceLabel(chosen)}</div>
        <div class="rf-location">
          <div class="rf-loc-row">📍 <span style="font-weight:500">${esc(cafe.name)}</span> · <span>${esc(cafe.location)}</span></div>
          <div class="rf-loc-row">🕐 <span>${open===null?'방학 단축운영 · 시간 확인 중':esc(cafe.hours)}</span>
            ${open===null?'':`<span style="color:${open?'#059669':'#9CA3AF'};font-weight:600;margin-left:4px">${open?'지금 영업 중':'영업 종료'}</span>`}
          </div>
        </div>
        <button class="rf-again" id="btnAgain">다시 추천</button>
        <div class="rf-comment">"${comment}"</div>
      </div>`;
      document.getElementById('btnAgain').addEventListener('click',()=>{isSpinning=false;document.getElementById('btnSpin').textContent='추천!';doSpin();});
      renderHistory();
      isSpinning=false;
      document.getElementById('btnSpin').textContent='추천!';
    }
  },72);
}

function renderHistory(){
  const sec=document.getElementById('historySec');
  const list=document.getElementById('historyList');
  if(!spinHistory.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=spinHistory.slice(0,3).map((m,i)=>
    `<div class="history-item">
      <span class="h-num">${i+1}</span>
      <span class="h-name">${esc(m.name)}</span>
      <span class="h-cafe" style="color:${m.cafeColorHex}">${esc(m.cafeName)}${m.subName?' · '+esc(m.subName):''}</span>
      <span class="h-cafe">${priceLabel(m)}</span>
    </div>`
  ).join('');
}

  document.getElementById('tabNav').innerHTML=
    `<button class="tab-btn ${curTab==='all'?'active':''}" data-tab="all" style="--tab-clr:var(--primary)">전체보기</button>`+
    CAFES.map((c,i)=>`<button class="tab-btn ${curTab===String(i)?'active':''}" data-tab="${i}" style="--tab-clr:${c.colorHex}">${esc(c.name)}</button>`).join('');
}

function renderCafeFilterChips(){
  document.getElementById('cafeFilter').innerHTML=
    `<button class="fchip ${filterCafe==='all'?'active':''}" data-cafe="all">전체</button>`+
    CAFES.map((c,i)=>{
      const on=filterCafe===String(i);
      return`<button class="fchip" data-cafe="${i}" data-color="${c.colorHex}"
        style="${on?`background:${c.colorHex};border-color:${c.colorHex};color:#fff`:''}">${esc(c.name)}</button>`;
    }).join('');
}

/* ============================================================
   EVENTS
============================================================ */
document.getElementById('tabNav').addEventListener('click',e=>{
  const b=e.target.closest('.tab-btn');if(!b)return;
  curTab=b.dataset.tab; curSub='all';
  if(curTab==='all')document.getElementById('subFilter').style.display='none';
  renderTabNav();
  renderMain();
});

document.getElementById('fabBtn').addEventListener('click',()=>{
  renderCafeFilterChips();
  document.getElementById('modalOverlay').classList.add('open');
  updatePoolCount();
});
document.getElementById('btnClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modalOverlay').classList.remove('open');});

document.getElementById('cafeFilter').addEventListener('click',e=>{
  const ch=e.target.closest('.fchip');if(!ch)return;
  filterCafe=ch.dataset.cafe;
  renderCafeFilterChips();
  updatePoolCount();
});
['catFilter2','priceFilter'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    const ch=e.target.closest('.fchip');if(!ch)return;
    document.querySelectorAll(`#${id} .fchip`).forEach(c=>c.classList.remove('active'));
    ch.classList.add('active');
    if(id==='catFilter2')filterCat=ch.dataset.cat;
    else filterPrice=ch.dataset.price;
    updatePoolCount();
  });
});

document.getElementById('btnSpin').addEventListener('click',doSpin);

/* ============================================================
   INIT
============================================================ */
document.getElementById('dateBadge').textContent=formatDate();
renderVacBanner();
renderStatus();
renderTabNav();
renderMain();
if(typeof lucide!=='undefined')lucide.createIcons();
</script>
</body>
</html>
